name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: ${{ matrix.compiler }}-${{ matrix.compiler-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # gfortran on Linux
          - os: ubuntu-latest
            compiler: gcc
            compiler-version: 13
            fpm-compiler: gfortran
          - os: ubuntu-latest
            compiler: gcc
            compiler-version: 14
            fpm-compiler: gfortran

          # gfortran on macOS
          - os: macos-latest
            compiler: gcc
            compiler-version: 13
            fpm-compiler: gfortran
          - os: macos-latest
            compiler: gcc
            compiler-version: 14
            fpm-compiler: gfortran
          - os: macos-latest
            compiler: gcc
            compiler-version: 15
            fpm-compiler: gfortran

          # flang on macOS
          - os: macos-latest
            compiler: llvm
            compiler-version: 21
            fpm-compiler: flang
          - os: macos-latest
            compiler: llvm
            compiler-version: 22
            fpm-compiler: flang

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Fortran compiler
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: ${{ matrix.compiler }}
          version: ${{ matrix.compiler-version }}

      - name: Install fpm (macOS)
        if: runner.os == 'macOS'
        run: brew install fpm

      - name: Install fpm (Linux)
        if: runner.os == 'Linux'
        uses: fortran-lang/setup-fpm@v7
        with:
          fpm-version: 'v0.13.0'

      - name: Build and test
        run: fpm test --compiler ${{ matrix.fpm-compiler }} --profile release
